<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频剪辑记录</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>视频剪辑记录</h1>
        <p class="subtle">每天记录剪辑内容，并按日期、月份和周进行汇总。</p>
      </header>

      <section class="card">
        <h2>本月任务总览</h2>
        <div class="grid-3">
          <div class="stat">
            <div class="label">当前月份</div>
            <div class="value" id="monthText">-</div>
          </div>
          <div class="stat">
            <div class="label">本月完成情况</div>
            <div class="value" id="monthCompletion">-</div>
          </div>
          <div class="stat">
            <div class="label">本周已完成获得的金币</div>
            <div class="value" id="weekCoins">-</div>
          </div>
        </div>
        <div class="hint">
          本周金币仅统计标记为<code>已完成</code>的条目。
        </div>
      </section>

      <section class="card">
        <h2>新增视频剪辑记录</h2>
        <form id="addForm" class="form">
          <div class="field">
            <label for="dateInput">日期</label>
            <input id="dateInput" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="nameInput">视频名称</label>
            <input id="nameInput" name="videoName" type="text" placeholder="例如：Intro_v12" required />
          </div>
          <div class="field">
            <label for="levelInput">账号等级</label>
            <select id="levelInput" name="accountLevel">
              <option value="">-</option>
              <option value="L1">L1</option>
              <option value="L2">L2</option>
              <option value="L3">L3</option>
              <option value="L4">L4</option>
              <option value="L5">L5</option>
              <option value="L6">L6</option>
              <option value="L7">L7</option>
              <option value="L8">L8</option>
            </select>
          </div>
          <div class="field">
            <label for="coinsInput">酬劳</label>
            <input id="coinsInput" name="coins" type="number" min="0" step="1" required />
          </div>
          <div class="field">
            <label for="completedInput">完成状态</label>
            <select id="completedInput" name="completed" required>
              <option value="false">未完成</option>
              <option value="true">已完成</option>
            </select>
          </div>
          <div class="actions">
            <button type="submit" class="primary">添加记录</button>
            <button type="button" id="reuseBtn" class="ghost">复用上一条记录</button>
            <button type="button" id="resetBtn" class="danger">清空所有数据</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="cardHeaderRow">
        <h2>日期汇总</h2>
          <label class="checkbox">
            <input id="showAllToggle" type="checkbox" />
            显示所有日期
          </label>
        </div>
        <div id="datesList" class="datesList" aria-live="polite"></div>
      </section>
    </div>

    <footer class="footer">
      数据保存在浏览器本地（IndexedDB）。
      <div style="margin-top: 10px;">
        <a class="ghostLink" href="records.html">按月查询记录</a>
      </div>
    </footer>

    <script src="db.js"></script>
    <script src="app.js"></script>
  </body>
</html>
